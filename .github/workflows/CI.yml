# ========================================
# 🔄 WORKFLOW ĐỒNG BỘ CI RESUKISU & AUTO RELEASE
# 👑 Việt hóa & Tối ưu bởi: p0s3id0n
# ========================================
# Workflow này tự động quét repo gốc của ReSukiSU mỗi 8 tiếng,
# lùng sục các bản build thành công có Manager-release, tải về,
# dọn dẹp file rác, gom file .ko và tự động xuất bản (Publish) 
# thành GitHub Release tại repo của mình.
# ========================================

name: 🔄 Đồng Bộ CI ReSukiSU (Auto Release)

on:
  schedule:
    # ⏱️ Chạy tự động mỗi 2 tiếng một lần
    - cron: '0 */2 * * *'
  # 🔘 Cho phép kích hoạt chạy bằng tay (Manual)
  workflow_dispatch: 

env:
  # 🎯 Số lượng Action Runs mới nhất muốn cào về để check
  N_LATEST_RUNS: 50 
  # 🎯 Repo mục tiêu để hút máu (Lấy bản gốc)
  TARGET_REPO: ReSukiSU/ReSukiSU

jobs:
  fetch-and-release:
    name: "🤖 Quét CI & Lên Kệ Release"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Clone Mã Nguồn Tại Chỗ
        uses: actions/checkout@v4

      - name: ⚙️ Nhào Nặn Artifacts & Bắn Release Lên Repo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🚀 Bắt đầu check $N_LATEST_RUNS bản build mới nhất từ $TARGET_REPO..."
          
          # Gọi API lấy các runs mới
          runs_json=$(gh api "repos/$TARGET_REPO/actions/runs?branch=main&per_page=$N_LATEST_RUNS" -q '[.workflow_runs[] | select(.event != "pull_request")] | reverse | .[] | {id: .id, title: .display_title, url: .html_url}')
          
          echo "$runs_json" | jq -c '.' | while read -r run; do
              run_id=$(echo "$run" | jq -r '.id')
              run_title=$(echo "$run" | jq -r '.title')
              run_url=$(echo "$run" | jq -r '.url')
              tag_name="ReSukiSU_${run_id}"
              
              echo "----------------------------------------"
              echo "🔍 Đang check Run ID: $run_id (Tiêu đề: $run_title)"
              
              # Check xem mẻ này đã xào (Release) bao giờ chưa
              if gh release view "$tag_name" >/dev/null 2>&1; then
                  echo "⚠️ Release tag $tag_name đã có trên kệ rồi. Bỏ qua cho rảnh nợ!"
                  continue
              fi
              
              # Soi xem nó có Artifact nào không
              artifacts_json=$(gh api repos/$TARGET_REPO/actions/runs/$run_id/artifacts)
              
              # 1. Xem có cục "Manager-release" không
              if echo "$artifacts_json" | jq -e '.artifacts[] | select(.name == "Manager-release")' > /dev/null; then
                  echo "✅ Ngon lành, đã thấy Manager-release! Tiến hành tải về các Artifacts về..."
                  
                  # Tạo folder tạm tên là ID của Action đó
                  mkdir -p "$run_id"
                  cd "$run_id"
                  
                  # Down sạch sẽ các Artifact của Action đó
                  echo "$artifacts_json" | jq -c '.artifacts[]' | while read -r artifact; do
                      art_id=$(echo "$artifact" | jq -r '.id')
                      art_name=$(echo "$artifact" | jq -r '.name')
                      echo "   ⬇️ Đang tải cục $art_name.zip..."
                      gh api repos/$TARGET_REPO/actions/artifacts/$art_id/zip > "${art_name}.zip"
                  done
                  
                  # Bung lụa đống zip vừa tải và phi tang xác zip
                  for zip_file in *.zip; do
                      if [ -f "$zip_file" ]; then
                          # Né mấy cục không cần thiết ra
                          if [[ "$zip_file" == ksud-*.zip ]] || [[ "$zip_file" == ksuinit.zip ]] || [[ "$zip_file" == Spoofed-*.zip ]]; then
                              echo "   ⏭️ 🗑️ Né không bung cục $zip_file"
                              continue
                          fi
                          echo "   📦 Đang giải nén $zip_file"
                          unzip -q -o "$zip_file"
                          rm "$zip_file"
                      fi
                  done
                  
                  # Búng các file APK từ thư mục con ra thẳng thư mục gốc rồi xóa folder rỗng
                  if [ -d "apk/release" ]; then
                      find apk/release -name "*.apk" -exec mv {} . \;
                  fi
                  if [ -d "apk/debug" ]; then
                      find apk/debug -name "*.apk" -exec mv {} . \;
                  fi
                  if [ -d "apk" ]; then
                      rm -rf apk
                  fi
                  
                  # Nhồi toàn bộ file .ko (Kernel Module) vào một cục lkm-all.zip cho gọn gàng
                  ko_files=(*.ko)
                  if [ ${#ko_files[@]} -gt 0 ] && [ "${ko_files[0]}" != "*.ko" ]; then
                      echo "   🗜️ Đang nhồi ${#ko_files[@]} file .ko vào chung một gói lkm-all.zip..."
                      zip -q lkm-all.zip "${ko_files[@]}"
                      echo "   🗑️ Dọn dẹp mấy file .ko lẻ tẻ gốc đi..."
                      rm "${ko_files[@]}"
                  else
                      echo "   ℹ️ Không thấy bóng dáng file .ko nào để nén."
                  fi
                  
                  # Định vị APK gốc và soi tìm 5 số Version Code vĩ đại
                  apk_file=$(find . -maxdepth 1 -name "ReSukiSU*_[0-9][0-9][0-9][0-9][0-9]-*.apk" | head -n 1)
                  
                  if [ -n "$apk_file" ]; then
                      # Dùng RegEx để moi 5 con số Version Code ra
                      if [[ "$apk_file" =~ _([0-9]{5})-.*\.apk$ ]]; then
                          five_digits="${BASH_REMATCH[1]}"
                          release_name="v${five_digits}"
                          
                          echo "🎉 Chuẩn bị lên mâm Release: $release_name (Tag: $tag_name)"
                          
                          # Gom hết file trong folder hiện tại để làm Release Assets
                          assets=()
                          for file in *; do
                              if [ -f "$file" ]; then
                                  assets+=("$file")
                              fi
                          done
                          
                          # Bắn Release lên GitHub!
                          if [ ${#assets[@]} -gt 0 ]; then
                              release_notes=$(printf "🚀 **Tự động kiểm tra, tải về Release.**\n\n%s\n\n🔗 **Link Action Gốc (Check Legit):** %s" "$run_title" "$run_url")
                              gh release create "$tag_name" "${assets[@]}" --title "$release_name" --notes "$release_notes"
                              echo "✅ Đã tạo Release $release_name thành công!"
                          else
                              echo "❌ Dọn dẹp xong chả còn file mẹ nào để up release. Nghỉ!"
                          fi
                      else
                          echo "❌ Bó tay, không soi ra được 5 số version từ cái tên file: $apk_file"
                      fi
                  else
                      echo "❌ Không tìm ra cái APK chuẩn bài (ReSukiSU_*_XXXXX-*.apk) nào. Lượn đi cho nước nó trong."
                  fi
                  
                  # Lùi ra ngoài và đốt sạch hiện trường để loop chạy tiếp mẻ khác
                  cd ..
                  rm -rf "$run_id"
              else
                  echo "⏭️ Run $run_id này móm rồi, đéo có Manager-release artifact. Skip!"
              fi
          done
          
          echo "🎉 Đã quét xong toàn bộ ! Chúc p0s3id0n đi ngủ ngon!"
